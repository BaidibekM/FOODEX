<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FoodExpress Cloud</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;background:#f2f2f2}
header{background:#111;color:#fff;text-align:center;padding:20px}
.container{padding:20px;max-width:1000px;margin:auto}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
.hidden{display:none}
button{background:#000;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
input{width:100%;padding:8px;margin:6px 0}
.menu{display:flex;gap:15px;flex-wrap:wrap}
.product{width:220px}
.price{color:red;font-weight:bold}
</style>
</head>
<body>

<header>
<h1>FoodExpress</h1>
</header>

<div class="container">

<div id="loginView" class="card">
<h3>Вход</h3>
<input id="username" placeholder="Логин">
<input id="password" type="password" placeholder="Пароль">
<button onclick="login()">Войти</button>
</div>

<div id="clientView" class="hidden">
<h3>Меню</h3>
<div id="menu" class="menu"></div>
<hr>
<h3>Корзина</h3>
<div id="cart"></div>
<div>Итого: <b id="total">0</b> ₸</div>
<button onclick="checkout()">Оформить заказ</button>
<button onclick="logout()">Выйти</button>
</div>

<div id="adminView" class="hidden">
<h3>Админ-панель</h3>
<div id="orders"></div>
<button onclick="logout()">Выйти</button>
</div>

</div>

<script type="module">

// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
getFirestore, collection, addDoc, getDocs, 
onSnapshot, updateDoc, doc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpHrdbsELpxP5XWD4cL9wD_tqznY7_rlE",
  authDomain: "foodex-1c9c5.firebaseapp.com",
  projectId: "foodex-1c9c5",
  storageBucket: "foodex-1c9c5.firebasestorage.app",
  messagingSenderId: "877374273335",
  appId: "1:877374273335:web:a5ea62758bfd4098e24cb2",
  measurementId: "G-1ZX0JWSBDG"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Данные
let user = null;
let cart = [];

const products = [
{id:1,name:'Бургер',price:1500},
{id:2,name:'Пицца',price:2500},
{id:3,name:'Суши',price:3200},
{id:4,name:'Картошка фри',price:900}
];

// Рендер меню
function renderMenu(){
const menu = document.getElementById("menu");
menu.innerHTML = "";
products.forEach(p=>{
menu.innerHTML += `
<div class="card product">
<h4>${p.name}</h4>
<div class="price">${p.price}₸</div>
<button onclick="addToCart(${p.id})">В корзину</button>
</div>`;
});
}

window.addToCart = function(id){
const p = products.find(x=>x.id===id);
const exist = cart.find(x=>x.id===id);
if(exist) exist.qty++;
else cart.push({...p,qty:1});
renderCart();
}

function renderCart(){
const el=document.getElementById("cart");
el.innerHTML="";
let total=0;
cart.forEach(item=>{
total+=item.price*item.qty;
el.innerHTML+=`
<div>${item.name} x${item.qty} — ${item.price*item.qty}₸</div>`;
});
document.getElementById("total").textContent=total;
}

// Логин
window.login = function(){
const u=document.getElementById("username").value;
const p=document.getElementById("password").value;

if(u==="admin"&&p==="admin"){
user="admin";
document.getElementById("loginView").classList.add("hidden");
document.getElementById("adminView").classList.remove("hidden");
listenOrders();
}
else if(u==="client"&&p==="client"){
user="client";
document.getElementById("loginView").classList.add("hidden");
document.getElementById("clientView").classList.remove("hidden");
renderMenu();
}
else alert("Неверный логин");
}

window.logout=function(){
location.reload();
}

// Оформление заказа
window.checkout = async function(){
if(cart.length===0){alert("Корзина пуста");return;}

await addDoc(collection(db,"orders"),{
client:"client",
items:cart,
total:cart.reduce((s,i)=>s+i.price*i.qty,0),
status:"принят",
created:new Date().toISOString()
});

alert("Заказ отправлен!");
cart=[];
renderCart();
}

// Админ получает заказы в реальном времени
function listenOrders(){
onSnapshot(collection(db,"orders"),(snapshot)=>{
const el=document.getElementById("orders");
el.innerHTML="";
snapshot.forEach(docSnap=>{
const o=docSnap.data();
el.innerHTML+=`
<div class="card">
<div><b>${o.client}</b></div>
<div>${o.total}₸</div>
<div>Статус: ${o.status}</div>
</div>`;
});
});
}

</script>

</body>
</html>
